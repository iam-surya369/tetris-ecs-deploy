#github actions file which will trigger on push to main branch where files inside app/ folder are changed
name: Deploy to Amazon ECS

on:
    push:
        branches:
            - main
        paths:
            - "app/**"
    workflow_dispatch:  # This adds a "Run Workflow" button in the GitHub UI

permissions:
  id-token: write # Required for OIDC
  contents: read

jobs:
    deploy:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v6.0.2

            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v4
              with:
                role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
                aws-region: ${{ secrets.AWS_REGION_NAME }}

            - name: Login to Amazon ECR
              id: login-ecr
              uses: aws-actions/amazon-ecr-login@v2

            - name: Set up Docker Buildx
              id: buildx
              uses: docker/setup-buildx-action@v3

            - name: Build and push Docker image
              id: build-and-push
              uses: docker/build-push-action@v6
              with:
                context: ./app
                file: app/Dockerfile
                push: true
                tags: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION_NAME }}.amazonaws.com/${{ vars.ECR_REPO_NAME }}:${{ github.sha }}
                # outputs: type=image,name=target,push-by-digest=true,name-canonical=true

            - name: Fill in the new image URI into the Amazon ECS task definition
              id: task-def
              uses: aws-actions/amazon-ecs-render-task-definition@v1
              with:
                task-definition: .aws/task-definition.json
                container-name: tetris-container         
                image: ${{ steps.login-ecr.outputs.registry }}/${{ vars.ECR_REPO_NAME }}:${{ github.sha }}

            - name: Deploy to Amazon ECS
              id: deploy
              uses: aws-actions/amazon-ecs-deploy-task-definition@v2
              with:
                task-definition: ${{ steps.task-def.outputs.task-definition }}
                service: ${{ vars.ECS_SERVICE }}
                cluster: ${{ vars.ECS_CLUSTER }}
                wait-for-service-stability: true